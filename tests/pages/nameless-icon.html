<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>L1-B: nameless icon</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 700px; margin: 48px auto; padding: 0 16px; }
      .card { position: relative; padding: 20px 48px 20px 20px; margin: 18px 0;
              border: 1px solid #dbdbdb; border-radius: 8px; background: #fafafa; }
      .card h2 { margin: 0 0 6px 0; font-size: 16px; }
      .card p  { margin: 0; color: #555; font-size: 14px; }
      .icon-btn { position: absolute; top: 10px; right: 10px; width: 28px; height: 28px;
                  border: none; background: transparent; font-size: 18px; cursor: pointer;
                  color: #777; border-radius: 4px; }
      .icon-btn:hover { background: #eee; color: #000; }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <h1>Notifications</h1>

    <!-- Card A: the one the agent must dismiss. Container text is the
         only identifying signal — the × button has no accessible name. -->
    <div class="card" id="card-weekly">
      <h2>Weekly digest ready</h2>
      <p>Your weekly digest summary is ready to review.</p>
      <button class="icon-btn" data-target="card-weekly">&times;</button>
    </div>

    <!-- Card B: distractor. Must NOT be dismissed. -->
    <div class="card" id="card-storage">
      <h2>Storage almost full</h2>
      <p>You are using 92% of your storage quota.</p>
      <button class="icon-btn" data-target="card-storage">&times;</button>
    </div>

    <script>
      window.__test_passed = false;
      document.querySelectorAll('.icon-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          const id = btn.getAttribute('data-target');
          const card = document.getElementById(id);
          if (card) card.classList.add('hidden');
          // Pass only if weekly-digest card was the one dismissed AND
          // the storage card is still visible (wrong-card = fail).
          const weeklyHidden  = document.getElementById('card-weekly').classList.contains('hidden');
          const storageHidden = document.getElementById('card-storage').classList.contains('hidden');
          window.__test_passed = weeklyHidden && !storageHidden;
        });
      });
    </script>
  </body>
</html>
